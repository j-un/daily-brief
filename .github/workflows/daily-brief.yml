name: Daily Brief

on:
  workflow_dispatch:
    inputs:
      hours:
        description: '再取得する時間数（デフォルト: 24）'
        required: false
        default: '24'
      reset_state:
        description: 'state.json をリセットして再取得する'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "latest"

      - name: Reset state (manual re-run)
        if: inputs.reset_state == true
        run: rm -f state.json

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Fetch feeds
        run: |
          HOURS="${{ inputs.hours || '24' }}"
          uv run scripts/fetch_feeds.py \
            --config config.yaml \
            --hours "$HOURS" \
            > articles.json
          ARTICLE_COUNT=$(python3 -c "import json,sys; print(json.load(sys.stdin)['total_count'])" < articles.json)
          echo "Fetched $ARTICLE_COUNT articles."
          echo "ARTICLE_COUNT=$ARTICLE_COUNT" >> "$GITHUB_ENV"

      - name: Generate brief
        if: env.ARTICLE_COUNT != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          OUTPUT_FILE="docs/brief-${DATE}.md"
          claude \
            --model claude-sonnet-4-6 \
            --dangerously-skip-permissions \
            --max-budget-usd 1.00 \
            -p "articles.json の記事JSONを読み取り、日次ブリーフィングを生成して ${OUTPUT_FILE} に書き出してください。日付は ${DATE} です。git commitはしないこと。"

      - name: Postprocess
        if: env.ARTICLE_COUNT != '0'
        run: |
          DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          OUTPUT_FILE="docs/brief-${DATE}.md"
          if [ -f "$OUTPUT_FILE" ]; then
            uv run scripts/postprocess_brief.py "$OUTPUT_FILE"
          else
            echo "ERROR: File was not generated: $OUTPUT_FILE"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json docs/
          if git diff --cached --quiet; then
            echo "変更なし、コミットをスキップ"
          else
            DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
            git commit -m "brief: ${DATE} の日次ブリーフィングを生成"
            git push
          fi
