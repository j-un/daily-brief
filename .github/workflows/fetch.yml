name: Fetch Feeds

on:
  schedule:
    # 6時間ごと（UTC 00/06/12/18 = JST 09/15/21/03）
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-feeds-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main (config.yaml, scripts)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          path: main

      - name: Checkout data branch (pool.json, state.json)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: data
          path: data

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "latest"

      - name: Fetch feeds into pool
        working-directory: data
        run: |
          uv run ../main/scripts/fetch_feeds.py \
            --config ../main/config.yaml \
            --state-file ./state.json \
            --pool-file ./pool.json \
            --retention-hours 28

      - name: Commit and push data branch
        working-directory: data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pool.json state.json
          if git diff --cached --quiet; then
            echo "変更なし、コミットをスキップ"
            exit 0
          fi
          git commit -m "chore(data): fetch feeds $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # brief との競合に備えて rebase リトライ
          for attempt in 1 2 3; do
            if git push origin data; then
              exit 0
            fi
            echo "push failed (attempt $attempt/3), rebasing..."
            git pull --rebase origin data
          done
          git push origin data
